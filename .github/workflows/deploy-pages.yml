# src/ のみを GitHub Pages に公開する(ADR-0004)
# docs/(ロール成果物)や .github/ は公開物に含めない
name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/deploy-pages.yml" # 自身の追加コミットで初回デプロイを発火させる
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: src

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
