# @claude メンションで対話的にClaudeを呼ぶワークフロー
# 用途: レビュー差し戻しの修正依頼、issueへの質問回答、随時の作業指示
# 例: PRコメントで「@claude レビュー指摘の1と3を修正して」
name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [assigned]

jobs:
  claude-response:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 50
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
